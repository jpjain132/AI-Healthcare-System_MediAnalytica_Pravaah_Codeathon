<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Smart Health Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
  box-sizing:border-box;
  font-family:Segoe UI,system-ui,sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:#f4f6fb;
}

/* ===== MAIN WRAPPER ===== */
.auth-wrapper{
  display:flex;
  min-height:100vh;
}

/* ===== LEFT LOGO ===== */
.auth-left{
  flex:1;
background-color: #fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.auth-left img{
  max-width:100%;
  height:auto;
  border-radius: 50px;
}

/* ===== RIGHT CONTENT ===== */
.auth-right{
  flex:1;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;   /* was 40px */
}

.auth-box{
  width:100%;
  max-width:380px;
}

/* ===== FORM ===== */
.auth-box h2{
  color:#007d96;
  margin-bottom:20px;
}

.auth-box input{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:8px;
  border:1px solid #ccc;
}

.auth-box button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#007d96;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  transition: ease-in-out 0.3s;
}
.auth-box button:hover{
  background-color:#5f939e;
}

.auth-box a{
  display:block;
  margin-top:14px;
  text-align:center;
  text-decoration:none;
  color:#007d96;
  transition: ease-in-out 0.3s;
}
.auth-box a:hover{
  color:#5f939e;
}

/* ===== RESPONSIVE BELOW 720px ===== */
@media (max-width:720px){
  .auth-wrapper{
    flex-direction:column;
  }

  .auth-left{
    min-height:220px;
  }

  .auth-right{
    padding:24px;
  }
}
</style>
</head>

<body>

<div class="auth-wrapper">

  <!-- LEFT -->
  <div class="auth-left">
    <img src="logo.jpg" alt="App Logo">
  </div>

  <!-- RIGHT -->
  <div class="auth-right">
    <div class="auth-box">
      <h2>Login</h2>

      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">

     <button id="loginBtn" onclick="login()">Login</button>


      <a href="register.html">Create new account</a>
    </div>
  </div>

</div>


<!-- 1️⃣ Load Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2️⃣ Load shared client.js -->
<script src="client.js"></script>

<!-- 3️⃣ Login Logic -->
<script>
function saveUserSession(email){
  const FIVE_DAYS = 5 * 24 * 60 * 60 * 1000;

  const sessionData = {
    email: email,
    verified: true,
    expiresAt: Date.now() + FIVE_DAYS
  };

  localStorage.setItem("user_session", JSON.stringify(sessionData));
}

async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const btn = document.getElementById("loginBtn");

  if(!email || !password){
    alert("Email and password are required");
    return;
  }

  if (!window.supabase || !window.supabase.auth) {
    alert("Supabase not initialized");
    console.error("Supabase missing");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Logging in...";
  btn.style.opacity = "0.7";
  btn.style.cursor = "not-allowed";

  const { error } = await window.supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error){
    alert(error.message);
    btn.disabled = false;
    btn.innerText = "Login";
    btn.style.opacity = "1";
    btn.style.cursor = "pointer";
    return;
  }

  /* ✅ SAVE SESSION FOR 5 DAYS */
  saveUserSession(email);

  window.location.href = "index.html";
}
</script>


</body>
</html>
