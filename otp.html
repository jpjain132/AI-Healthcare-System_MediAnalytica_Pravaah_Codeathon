<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Verification | Smart Health Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
  font-family:Segoe UI,system-ui,sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:#f4f6fb;
}

/* ===== MAIN WRAPPER ===== */
.auth-wrapper{
  display:flex;
  min-height:100vh;
}

/* ===== LEFT LOGO ===== */
.auth-left{
  flex:1;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.auth-left img{
  max-width:100%;
  height:auto;
  border-radius:50px;
}

/* ===== RIGHT CONTENT ===== */
.auth-right{
  flex:1;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}

.auth-box{
  width:100%;
  max-width:380px;
}

.auth-box h2{
  color:#007d96;
  margin-bottom:20px;
}

.auth-box input{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:8px;
  border:1px solid #ccc;
  text-align:center;
  letter-spacing:2px;
}

.auth-box button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#007d96;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
.auth-box button:hover{
  background:#5f939e;
}

@media (max-width:720px){
  .auth-wrapper{flex-direction:column;}
  .auth-left{min-height:220px;}
  .auth-right{padding:24px;}

  width:100%;
  height:44px;
  border:2px solid #007d96;

<body>

<div class="auth-wrapper">

  <div class="auth-left">
    <img src="logo.jpg" alt="Logo">
  </div>

  <div class="auth-right">
    <div class="auth-box">
      <h2>Verify Your Email</h2>

      <input id="email" type="email" placeholder="Registered Email" readonly>
      <input id="otp" type="text" maxlength="6" placeholder="Enter OTP">

      <button id="verifyBtn" onclick="verifySignupOtp()">Verify OTP</button>
    </div>
  </div>

</div><!-- Supabase library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Supabase initialization -->
<script src="client.js"></script>
<script>
  // Get email from URL
  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");

  // Autofill email field
  if (email) {
    document.getElementById("email").value = email;
  } else {
    alert("Email missing. Please register again.");
    window.location.href = "register.html";
  }
</script>

<!-- Your OTP / session logic -->
<script>
  function saveUserSession(email) {
    const FIVE_DAYS = 5 * 24 * 60 * 60 * 1000;

    const sessionData = {
      email,
      verified: true,
      expiresAt: Date.now() + FIVE_DAYS
    };

    localStorage.setItem("user_session", JSON.stringify(sessionData));
  }

  async function verifySignupOtp() {
    const otpInput = document.getElementById("otp");
    const btn = document.getElementById("verifyBtn");

    const otp = otpInput.value.trim();

    if (!email || !otp) {
      alert("Email and OTP are required");
      return;
    }

    if (!window.supabase || !window.supabase.auth) {
      alert("Supabase not initialized");
      console.error("Supabase object:", window.supabase);
      return;
    }

    btn.disabled = true;
    btn.innerText = "Verifying...";
    btn.style.opacity = "0.7";

    const { error } = await window.supabase.auth.verifyOtp({
      email,
      token: otp,
      type: "signup"
    });

    if (error) {
      alert(error.message);
      btn.disabled = false;
      btn.innerText = "Verify OTP";
      btn.style.opacity = "1";
      return;
    }

    saveUserSession(email);
    window.location.href = "index.html";
  }
</script>



</body>
</html>
